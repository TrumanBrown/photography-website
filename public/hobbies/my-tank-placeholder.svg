<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Placeholder for a photo of my tank">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10465f"/>
      <stop offset="0.55" stop-color="#0b3346"/>
      <stop offset="1" stop-color="#072531"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#water)"/>

  <!-- substrate -->
  <rect x="0" y="690" width="1200" height="110" fill="#241a12"/>
  <g fill="#3a2c1d">
    <rect x="40" y="700" width="16" height="16"/>
    <rect x="180" y="712" width="16" height="16"/>
    <rect x="360" y="704" width="16" height="16"/>
    <rect x="640" y="716" width="16" height="16"/>
    <rect x="900" y="702" width="16" height="16"/>
    <rect x="1080" y="712" width="16" height="16"/>
  </g>

  <!-- plants -->
  <g fill="#2f7d32">
    <rect x="150" y="560" width="16" height="140"/>
    <rect x="170" y="600" width="16" height="100"/>
    <rect x="980" y="540" width="16" height="160"/>
    <rect x="1000" y="590" width="16" height="110"/>
  </g>
  <g fill="#3f9d4a">
    <rect x="166" y="540" width="16" height="160"/>
    <rect x="996" y="520" width="16" height="180"/>
  </g>

  <!-- pixel fish -->
  <g>
    <rect x="540" y="372" width="24" height="24" fill="#2bb6d6"/>
    <rect x="564" y="360" width="96" height="48" fill="#2bb6d6"/>
    <rect x="564" y="380" width="96" height="12" fill="#e3354e"/>
    <rect x="636" y="368" width="12" height="12" fill="#ffffff"/>
    <rect x="648" y="368" width="6" height="12" fill="#0a0a0a"/>
  </g>

  <text x="600" y="300" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="40" font-weight="600" fill="#dfe8ee">Photo coming soon</text>
  <text x="600" y="345" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" fill="#9fb4bf">a picture of my real tank will go here</text>
</svg>
