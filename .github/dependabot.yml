# Dependabot keeps compatible dependencies current with low noise: one grouped
# minor/patch PR per ecosystem per month. Major upgrades are deliberate
# migrations because framework packages often need to move together.
version: 2
updates:
  # Site dependencies (Astro, Tailwind, sharp, etc.)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      site-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # Azure Functions API dependencies
  - package-ecosystem: npm
    directory: "/api"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      api-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
