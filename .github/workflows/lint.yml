name: Lint and Type Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm test

      - name: ESLint
        run: npm run lint

      - name: Prettier (check)
        run: npm run format:check
        continue-on-error: true

      - name: Astro type check
        run: |
          # Need at least one fixture session for astro check to validate the
          # collection schema. Synthesize without hitting Azure.
          node scripts/generate-fixtures.mjs
          npm run check
