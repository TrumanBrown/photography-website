name: Infra (Bicep)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (prod/dev)'
        required: true
        default: 'prod'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep (subscription scope)
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: westus3
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          template: ./infra/subscription.bicep
          parameters: ./infra/main.parameters.json githubOwner=${{ github.repository_owner }} githubRepo=${{ github.event.repository.name }} environment=${{ inputs.environment }}
          deploymentName: photography-${{ inputs.environment }}-${{ github.run_id }}
          failOnStdErr: false

      - name: Surface outputs
        run: |
          echo "Resource group: ${{ steps.deploy.outputs.resourceGroupName }}"
          echo "Storage account: ${{ steps.deploy.outputs.storageAccountName }}"
          echo "Blob endpoint: ${{ steps.deploy.outputs.blobEndpoint }}"
          echo "SWA hostname: ${{ steps.deploy.outputs.swaDefaultHostname }}"
          echo "MI client id: ${{ steps.deploy.outputs.managedIdentityClientId }}"

      - name: Configure SWA API runtime
        env:
          RESOURCE_GROUP: ${{ steps.deploy.outputs.resourceGroupName }}
          STORAGE_ACCOUNT: ${{ steps.deploy.outputs.storageAccountName }}
          SWA_NAME: ${{ steps.deploy.outputs.swaName }}
          INITIAL_ADMIN_GITHUB_USER: ${{ github.actor }}
        run: |
          STORAGE_CONNECTION_STRING=$(az storage account show-connection-string \
            --name "$STORAGE_ACCOUNT" \
            --resource-group "$RESOURCE_GROUP" \
            --query connectionString -o tsv)
          if [[ -z "$STORAGE_CONNECTION_STRING" ]]; then
            echo "Failed to fetch the storage connection string." >&2
            exit 1
          fi
          echo "::add-mask::$STORAGE_CONNECTION_STRING"

          ANALYTICS_SALT=$(printf 'photography-analytics:%s' "$STORAGE_CONNECTION_STRING" | sha256sum | cut -d' ' -f1)
          echo "::add-mask::$ANALYTICS_SALT"

          ADMIN_GITHUB_USERS=$(az staticwebapp appsettings list \
            --name "$SWA_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.ADMIN_GITHUB_USERS -o tsv)
          ADMIN_GITHUB_USERS="${ADMIN_GITHUB_USERS:-$INITIAL_ADMIN_GITHUB_USER}"

          az staticwebapp appsettings set \
            --name "$SWA_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --setting-names \
              "AZURE_STORAGE_CONNECTION_STRING=$STORAGE_CONNECTION_STRING" \
              "ANALYTICS_SALT=$ANALYTICS_SALT" \
              "ADMIN_GITHUB_USERS=$ADMIN_GITHUB_USERS" \
            --output none

      - name: Fetch SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ steps.deploy.outputs.swaName }}" \
            --resource-group "${{ steps.deploy.outputs.resourceGroupName }}" \
            --query "properties.apiKey" -o tsv)
          if [ -z "$TOKEN" ]; then
            echo "Failed to fetch SWA deployment token." >&2
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Write SWA token into repo secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_SECRETS }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::GH_PAT_FOR_SECRETS not set; cannot auto-update AZURE_STATIC_WEB_APPS_API_TOKEN."
            echo "Run ./scripts/bootstrap-swa-token.sh '${{ steps.deploy.outputs.resourceGroupName }}' '${{ steps.deploy.outputs.swaName }}' '${{ github.repository }}' from an authenticated machine."
            exit 0
          fi
          gh secret set AZURE_STATIC_WEB_APPS_API_TOKEN \
            --repo "${{ github.repository }}" \
            --body "${{ steps.swa-token.outputs.token }}"
          gh secret set AZURE_STORAGE_ACCOUNT \
            --repo "${{ github.repository }}" \
            --body "${{ steps.deploy.outputs.storageAccountName }}"
