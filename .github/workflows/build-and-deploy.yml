name: Build and Deploy

on:
  push:
    branches: [main]
    # Docs, license, and meta files don't change the built site, so skip the
    # full image build + deploy for commits that only touch them. The hourly
    # cron and manual dispatch are still available if a rebuild is ever wanted.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.github/SECURITY.md'
  pull_request:
    branches: [main]
  schedule:
    # Hourly cron — picks up new blobs without any push.
    - cron: '0 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [blob-changed]

# Cancel older runs on the same ref when a new one arrives.
concurrency:
  group: build-and-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Cache apt packages (libraw-bin)
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-libraw-bin-v2

      - name: Install image conversion tools
        # libraw-bin: dcraw_emu for Sony/Nikon/Canon RAW
        # python3-pillow-heif: handles iPhone HDR HEIC (which heif-convert
        #   and ImageMagick's libheif delegate both fail to decode)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libraw-bin \
            python3-pip
          # pillow-heif is pip-installable; --break-system-packages is fine on
          # the ephemeral runner.
          sudo pip install --break-system-packages --quiet pillow pillow-heif

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Restore prebuild cache
        uses: actions/cache@v4
        with:
          path: .cache/prebuild
          key: prebuild-cache-${{ github.run_id }}
          restore-keys: |
            prebuild-cache-

      - name: Run prebuild (sync from Blob)
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
        run: node scripts/prebuild.mjs

      - name: Restore Astro asset cache
        # .cache/astro holds Astro's optimized image variants. Persisting it
        # means only new/changed photos are re-encoded by sharp each build,
        # instead of regenerating every variant from scratch.
        uses: actions/cache@v4
        with:
          path: .cache/astro
          key: astro-cache-${{ github.run_id }}
          restore-keys: |
            astro-cache-

      - name: Astro build
        env:
          PUBLIC_APPINSIGHTS_CONNECTION_STRING: ${{ secrets.APPINSIGHTS_CONNECTION_STRING }}
        run: npm run build

      - name: Sync image variants to Blob (keep SWA payload tiny)
        # Moves dist/_astro/*.{avif,webp,jpeg,jpg} to the `variants/` blob
        # container, rewrites HTML refs to the blob URL, and deletes the
        # variants from local dist. SWA deploy stays under 5 MB regardless
        # of how many photos are on the site.
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
        run: node scripts/sync-variants.mjs

      - name: Stage staticwebapp.config.json into dist/
        # When skip_app_build is true, SWA treats app_location as the deploy
        # root. Astro doesn't copy non-public configs into dist/, so we put
        # the config alongside the built site here.
        run: cp staticwebapp.config.json dist/

      - name: Save prebuild cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/prebuild
          key: prebuild-cache-${{ github.run_id }}

      - name: Save Astro asset cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/astro
          key: astro-cache-${{ github.run_id }}

      - name: Install API dependencies
        run: cd api && npm ci

      - name: Deploy to Azure Static Web Apps
        id: swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: 'dist'
          api_location: 'api'
          skip_app_build: true

  close_pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR preview
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
